<!-- Order Icon (single point with radiating detached lines, sun-like) -->
<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 200 200" fill="none">
  <defs>
    <style>
      :root {
        --stroke: #4A3B32;
        --node-fill: #E8C9A0;
      }
      .ray { stroke: var(--stroke); stroke-width: 8; stroke-linecap: round; }
      .core { fill: var(--node-fill); stroke: var(--stroke); stroke-width: 8; }
    </style>
  </defs>
  <!-- Detached radiating rays -->
  <line x1="100" y1="22" x2="100" y2="48" class="ray"/>
  <line x1="155" y1="45" x2="137" y2="63" class="ray"/>
  <line x1="178" y1="100" x2="152" y2="100" class="ray"/>
  <line x1="155" y1="155" x2="137" y2="137" class="ray"/>
  <line x1="100" y1="178" x2="100" y2="152" class="ray"/>
  <line x1="45" y1="155" x2="63" y2="137" class="ray"/>
  <line x1="22" y1="100" x2="48" y2="100" class="ray"/>
  <line x1="45" y1="45" x2="63" y2="63" class="ray"/>

  <!-- Central point -->
  <circle cx="100" cy="100" r="20" class="core"/>
</svg>
