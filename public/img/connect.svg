<!-- Network Icon -->
<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 200 200" fill="none">
  <defs>
    <style>
      :root {
        --stroke: #4A3B32;
        --node-fill: #E8C9A0;
      }
      circle, line { stroke: var(--stroke); stroke-width: 8; }
      circle { fill: var(--node-fill); }
    </style>
  </defs>
  <!-- Connections -->
  <line x1="55" y1="55" x2="100" y2="125"/>
  <line x1="145" y1="55" x2="100" y2="125"/>
  <line x1="155" y1="145" x2="100" y2="125"/>

  <!-- Nodes -->
  <circle cx="55" cy="55" r="20"/>
  <circle cx="145" cy="55" r="20"/>
  <circle cx="100" cy="125" r="20"/>
  <circle cx="155" cy="145" r="20"/>
</svg>