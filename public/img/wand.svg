<!-- Magic Wand Icon -->
<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 200 200" fill="none">
  <defs>
    <style>
      :root {
        --stroke: #4A3B32;
        --wand-fill: #E8C9A0;
      }
      .wand-tip { stroke: var(--wand-fill); stroke-width: 16; stroke-linecap: round; }
      .wand { stroke: var(--stroke); stroke-width: 16; stroke-linecap: butt; }
      .wand-end { fill: var(--stroke); }
      .star { fill: var(--wand-fill); stroke: var(--stroke); stroke-width: 5; }
    </style>
  </defs>
  <!-- Wand tip (blue, behind shaft) -->
  <line x1="108" y1="100" x2="130" y2="78" class="wand-tip"/>
  
  <!-- Wand body (dark, overlaps bottom portion) -->
  <line x1="38" y1="170" x2="120" y2="88" class="wand"/>
  <circle cx="38" cy="170" r="8" class="wand-end"/>
  
  <!-- Main star ahead of tip, toward corner -->
  <polygon points="160,23 165,38 181,38 168,48 173,63 160,53 147,63 152,48 139,38 155,38" class="star"/>
  
  <!-- Small star above tip -->
  <polygon points="122,23 125,31 133,31 127,36 129,44 122,39 115,44 117,36 111,31 119,31" class="star"/>
  
  <!-- Small star right of tip -->
  <polygon points="170,70 173,78 181,78 175,83 177,91 170,86 163,91 165,83 159,78 167,78" class="star"/>
</svg>
