<!-- Padlock Icon -->
<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 200 200" fill="none">
  <defs>
    <style>
      :root {
        --stroke: #4A3B32;
        --lock-fill: #E8C9A0;
      }
      rect, path, circle { stroke: var(--stroke); }
      .lock-body { fill: var(--lock-fill); }
      .keyhole { fill: var(--stroke); }
    </style>
  </defs>
  <!-- Shackle -->
  <path d="M72 90 Q72 42 100 42 Q128 42 128 90" fill="none" stroke-width="20" stroke-linecap="round"/>
  
  <!-- Lock body -->
  <rect x="48" y="90" width="104" height="80" rx="14" class="lock-body" stroke-width="10"/>
  
  <!-- Keyhole -->
  <circle cx="100" cy="125" r="11" class="keyhole"/>
  <rect x="97" y="125" width="6" height="22" class="keyhole" rx="2"/>
</svg>