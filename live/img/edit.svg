<!-- Edit Icon -->
<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 200 200" fill="none">
  <defs>
    <style>
      :root {
        --stroke: #4A3B32;
        --paper-fill: #E8C9A0;
      }
      rect, path, polygon, line { stroke: var(--stroke); }
      .paper { fill: var(--paper-fill); }
      .line { stroke-width: 4; stroke-linecap: round; }
      .wood, .body, .eraser { fill: var(--paper-fill); stroke-width: 5; }
      .graphite, .ferrule { fill: var(--stroke); stroke-width: 5; }
    </style>
  </defs>
  <!-- Notepad sheet with folded top-right corner -->
  <path d="M40 46 Q40 40 46 40 L96 40 L120 64 L120 154 Q120 160 114 160 L46 160 Q40 160 40 154 Z" class="paper" stroke-width="10" stroke-linejoin="round"/>
  <path d="M96 40 L96 64 L120 64" fill="none" stroke-width="6" stroke-linejoin="round"/>
  
  <!-- Ruled lines -->
  <line x1="54" y1="86" x2="104" y2="86" class="line"/>
  <line x1="54" y1="106" x2="104" y2="106" class="line"/>
  <line x1="54" y1="126" x2="96" y2="126" class="line"/>
  
  <!-- Pencil (tip writes on the sheet, eraser toward top-right) -->
  <g transform="translate(96,150) rotate(-45)">
    <!-- sharpened wood cone -->
    <polygon points="0,0 26,-8 26,8" class="wood"/>
    <!-- graphite point -->
    <polygon points="0,0 11,-4 11,4" class="graphite"/>
    <!-- painted body -->
    <rect x="26" y="-8" width="50" height="16" class="body"/>
    <!-- metal ferrule -->
    <rect x="76" y="-8" width="9" height="16" class="ferrule"/>
    <!-- eraser -->
    <rect x="85" y="-8" width="10" height="16" rx="4" class="eraser"/>
  </g>
</svg>
